<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فايز / Fayez</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg: #0a0a0a; --card: #111111; --border: #1e1e1e; --accent: #c8ff00; --text: #f0f0f0; --muted: #555; }
  body { background: var(--bg); color: var(--text); font-family: 'Tajawal', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  .container { width: 100%; max-width: 420px; animation: fadeUp 0.6s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  .header { text-align: center; margin-bottom: 40px; }
  .avatar-ring { width: 90px; height: 90px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 900; color: #0a0a0a; font-family: 'Space Mono', monospace; box-shadow: 0 0 0 3px var(--bg), 0 0 0 5px var(--accent); margin: 0 auto 18px; }
  .name { font-size: 28px; font-weight: 900; }
  .name span { color: var(--accent); font-family: 'Space Mono', monospace; font-size: 13px; display: block; margin-top: 4px; letter-spacing: 2px; opacity: 0.8; }
  .bio { margin-top: 10px; font-size: 14px; color: var(--muted); }
  .links { display: flex; flex-direction: column; gap: 12px; }
  .link-btn { display: flex; align-items: center; gap: 14px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px 20px; text-decoration: none; color: var(--text); transition: all 0.2s ease; position: relative; overflow: hidden; }
  .link-btn::after { content: ''; position: absolute; inset: 0; background: var(--accent); opacity: 0; transition: opacity 0.2s ease; border-radius: inherit; }
  .link-btn:hover { border-color: var(--accent); transform: translateX(-4px); }
  .link-btn:hover::after { opacity: 1; }
  .link-btn:hover .icon, .link-btn:hover .label, .link-btn:hover .handle, .link-btn:hover .arrow { position: relative; z-index: 1; color: #0a0a0a; }
  .icon { font-size: 22px; width: 32px; text-align: center; flex-shrink: 0; }
  .label { font-weight: 700; font-size: 15px; flex: 1; }
  .handle { font-size: 12px; color: var(--muted); font-family: 'Space Mono', monospace; display: block; margin-top: 2px; }
  .arrow { font-size: 16px; color: var(--muted); }
  .footer { text-align: center; margin-top: 36px; font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; letter-spacing: 1px; }
  .dot { display: inline-block; width: 5px; height: 5px; background: var(--accent); border-radius: 50%; margin: 0 6px; vertical-align: middle; }
</style>
</head>
<body>
<div class="container">

  </div>
  <div class="links">

      <span><span class="label">TikTok</span><span class="handle">@iifl_77</span></span>
      <span class="arrow">←</span>
    </a>
    <a href="https://youtube.com/@iifl_77" target="_blank" class="link-btn">
      <span class="icon">▶️</span>
      <span><span class="label">YouTube</span><span class="handle">@iifl_77</span></span>
      <span class="arrow">←</span>
    </a>
    <a href="https://www.instagram.com/iifl_77" target="_blank" class="link-btn">
      <span class="icon">📷</span>
      <span><span class="label">Instagram</span><span class="handle">@iifl_77</span></span>
      <span class="arrow">←</span>
    </a>
    <a href="https://x.com/iifl_77" target="_blank" class="link-btn">
      <span class="icon">✖️</span>
      <span><span class="label">X (Twitter)</span><span class="handle">@iifl_77</span></span>
      <span class="arrow">←</span>
    </a>
    <a href="https://snapchat.com/t/o7vnzpOR" target="_blank" class="link-btn">
      <span class="icon">👻</span>
      <span><span class="label">Snapchat</span><span class="handle">iifl_77</span></span>
      <span class="arrow">←</span>
    </a>
  </div>
  <div class="footer">فايز <span class="dot"></span> iifl_77</div>
</div>
</body>
</html>
